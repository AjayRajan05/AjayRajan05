<svg width="1200" height="450" xmlns="http://www.w3.org/2000/svg">

<style>

@keyframes blink {
  0% {opacity:1;}
  50% {opacity:0.4;}
  100% {opacity:1;}
}

@keyframes glow {
  0% {filter: drop-shadow(0 0 2px #ff4fd8);}
  50% {filter: drop-shadow(0 0 8px #ff4fd8);}
  100% {filter: drop-shadow(0 0 2px #ff4fd8);}
}

.title {
  font-family: monospace;
  font-size: 52px;
  fill:#ff4fd8;
  animation: glow 3s infinite;
}

.text {
  font-family: monospace;
  font-size: 22px;
  fill:#c77dff;
}

.status {
  font-family: monospace;
  font-size:18px;
  fill:#9d4edd;
}

.cursor {
  animation: blink 1s infinite;
}

</style>

<!-- Main Title -->
<text x="50%" y="45%" text-anchor="middle" class="title">
[ AI ENGINEER ]
</text>

<!-- Skills -->
<text x="50%" y="55%" text-anchor="middle" class="text">
Machine Learning
</text>

<text x="50%" y="60%" text-anchor="middle" class="text">
Voice AI
</text>

<text x="50%" y="65%" text-anchor="middle" class="text">
Intelligent Systems
</text>

<!-- System Status -->
<text x="50%" y="75%" text-anchor="middle" class="status">
STATUS: ONLINE
</text>

<text x="50%" y="80%" text-anchor="middle" class="status">
SYSTEM: ACTIVE <tspan class="cursor">█</tspan>
</text>

</svg>