<svg width="1200" height="400" xmlns="http://www.w3.org/2000/svg">

<style>

@keyframes particleMove {
0% { transform: translateY(0px); opacity:0.3 }
50% { transform: translateY(-15px); opacity:0.9 }
100% { transform: translateY(0px); opacity:0.3 }
}

.p1 { fill:#ff4fd8; animation: particleMove 4s infinite ease-in-out; }
.p2 { fill:#c77dff; animation: particleMove 6s infinite ease-in-out; }
.p3 { fill:#9d4edd; animation: particleMove 5s infinite ease-in-out; }

</style>

<circle class="p1" cx="200" cy="150" r="3"></circle>
<circle class="p2" cx="400" cy="250" r="2"></circle>
<circle class="p3" cx="700" cy="120" r="3"></circle>
<circle class="p2" cx="950" cy="200" r="2"></circle>
<circle class="p1" cx="1100" cy="160" r="3"></circle>

</svg>