<svg width="1200" height="400" xmlns="http://www.w3.org/2000/svg">

<style>

@keyframes float {
0% { transform: translateY(0px); }
50% { transform: translateY(-8px); }
100% { transform: translateY(0px); }
}

@keyframes glow {
0% { opacity: 0.7; }
50% { opacity: 1; }
100% { opacity: 0.7; }
}

.title {
font: bold 64px 'Orbitron', sans-serif;
fill: #ff4fd8;
animation: float 6s ease-in-out infinite, glow 3s infinite;
}

.subtitle {
font: 24px 'Orbitron', sans-serif;
fill: #c77dff;
animation: glow 4s infinite;
}

</style>

<text x="50%" y="55%" text-anchor="middle" class="title">
AI ENGINEER
</text>

<text x="50%" y="70%" text-anchor="middle" class="subtitle">
Machine Learning • Voice AI • Intelligent Systems
</text>

</svg>